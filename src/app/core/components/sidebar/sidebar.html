<div class="sidebar animate-slide-in" [class.mobile-open]="isOpen">
    <!-- Brand Logo -->
    <div class="logo-container">
        <div class="logo-wrapper">
            <div class="logo-icon">▲</div>
        </div>
        <div class="logo-details">
            <span class="logo-text font-bold">MicroLMS</span>
            <span class="logo-tagline text-xs">Scale your academy</span>
        </div>
        <!-- Mobile Close Button -->
        <button class="mobile-close-btn" (click)="onClose()">
            <span>✕</span>
        </button>
    </div>

    <nav class="sidebar-nav">
        <!-- Section: Super Admin -->
        <div class="nav-section">
            <span class="section-title">PLATFORM CONTROL</span>
            <a class="nav-item" routerLink="/super-admin/dashboard" routerLinkActive="active">
                <span class="icon">📊</span>
                <span class="label">Dashboard</span>
            </a>
            <a class="nav-item" routerLink="/super-admin/tenants" routerLinkActive="active">
                <span class="icon">🏢</span>
                <span class="label">Tenants</span>
            </a>
            <a class="nav-item" routerLink="/super-admin/plans" routerLinkActive="active">
                <span class="icon">💳</span>
                <span class="label">Subscription Plans</span>
            </a>
        </div>

        <!-- Section: Tenant Admin -->
        <div class="nav-section">
            <span class="section-title">MANAGEMENT</span>
            <a class="nav-item" routerLink="/tenant-admin/branding" routerLinkActive="active">
                <span class="icon">🎨</span>
                <span class="label">Branding</span>
            </a>
            <a class="nav-item" routerLink="/tenant-admin/builder" routerLinkActive="active">
                <span class="icon">🏗️</span>
                <span class="label">Course Builder</span>
            </a>
            <a class="nav-item" routerLink="/tenant-admin/users" routerLinkActive="active">
                <span class="icon">👥</span>
                <span class="label">User Management</span>
            </a>
            <a class="nav-item" routerLink="/tenant-admin/revenue" routerLinkActive="active">
                <span class="icon">📊</span>
                <span class="label">Revenue</span>
            </a>
        </div>

        <!-- Section: Learner -->
        <div class="nav-section learner-section">
            <span class="section-title">LEARNING</span>
            <a class="nav-item" routerLink="/learner/space" routerLinkActive="active">
                <span class="icon">🏠</span>
                <span class="label">My Learning</span>
            </a>
            <a class="nav-item" routerLink="/learner/catalog" routerLinkActive="active">
                <span class="icon">🧭</span>
                <span class="label">Catalog</span>
            </a>
            <a class="nav-item" routerLink="/learner/profile" routerLinkActive="active">
                <span class="icon">✨</span>
                <span class="label">Profile Vibe</span>
            </a>
            <a class="nav-item" routerLink="/learner/player">
                <span class="icon">📽️</span>
                <span class="label">Open Player</span>
            </a>
            <a class="nav-item" routerLink="/learner/settings" routerLinkActive="active">
                <span class="icon">⚙️</span>
                <span class="label">Settings</span>
            </a>
        </div>
    </nav>

    <!-- User Profile & Session -->
    <div class="sidebar-footer">
        <div class="user-profile-card">
            <div class="flex items-center gap-3">
                <div class="avatar-circle">AR</div>
                <div class="user-meta">
                    <span class="user-name">Alex Rivera</span>
                    <span class="user-role">Super Admin</span>
                </div>
            </div>
            <div class="footer-actions flex gap-2">
                <button class="theme-toggle-btn" (click)="theme.toggleTheme()"
                    [title]="theme.isDarkMode() ? 'Switch to Light' : 'Switch to Dark'">
                    <span>{{ theme.isDarkMode() ? '☀️' : '🌙' }}</span>
                </button>
                <button class="logout-btn-icon" (click)="logout()" title="Logout Session">
                    <span>🚪</span>
                </button>
            </div>
        </div>
    </div>
</div>
